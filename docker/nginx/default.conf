server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    # DNS embebido de Docker: evita 502 si el contenedor `app` cambia de IP al reiniciar.
    resolver 127.0.0.11 valid=10s ipv6=off;
    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        set $fpm_upstream app:9000;
        fastcgi_pass $fpm_upstream;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        # Bind mount Windows → Docker suele hacer muy lentos vendor/storage (504 si nginx corta a 60s).
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
